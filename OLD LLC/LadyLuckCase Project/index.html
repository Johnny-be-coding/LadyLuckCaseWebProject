<!DOCTYPE html>
<html lang="bg">

<head>
    <meta charset="UTF-8" />

        <div class="result" id="result"></div>
    </main>

    <canvas id="confettiCanvas"></canvas>

        Създадено с ♡ за 8 март • Реалистична CS2 анимация

    <script src="script.js"></script>
