<!DOCTYPE html>
<html lang="bg">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lady Luck Case</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<script>
// Confetti animation script is handled in createConfetti() function
</script>

</head>

<body>

<header>
  <h1>Lady Luck Case</h1>
  <div class="subtitle">8 Март Collection</div>
</header>

<main>

<div class="case-wrapper">

  <div class="case-container">
    <div class="case" id="case">
      <img id="caseImage" src="pictures/CaseDone.jpg" alt="Case">
      <div class="case-glow" id="caseGlow"></div>
    </div>
  </div>

  <button id="openBtn" class="open-btn">Отвори Lady Luck Case</button>
</div>

<div class="reel-container" id="reelContainer">
  <div class="indicator-bar"></div>
  <div class="reel" id="reel"></div>
</div>

<div id="result" class="result"></div>

<script>
const skins = [
  { name:"P250", rarity:"blue", chance:20, img:"pictures/P250Done.jpg", desc:"Честит 8 март! Пожелавам ти домът винаги да е пълен с любов и топлина. Нека мъката и проблемите винаги те подминават." },
  { name:"Tec 9", rarity:"blue", chance:20, img:"pictures/Tec9Done.jpg", desc:"Честит 8 март! Нека очите ти блестят от радost, нека всичките ти мечти се превърнат в реалност." },
  { name:"USP-S", rarity:"blue", chance:20, img:"pictures/USPsDone.jpg", desc:"В този прекрасен ден искам искрено да те поздравя. Пожелавам ти да останеш все така нежна, мъдра и красива." },
  { name:"Shadow Daggers", rarity:"gold", chance:0.26, img:"pictures/ShadowDaggersDone.png", desc:"Честит 8 март, мила! Пожелавам ти всичко най-красиво в този прекрасен ден – много цветя, комплименти и усмивки." },
  { name:"M4A4", rarity:"red", chance:0.64, img:"pictures/m4a4Done.png", desc:"Честит 8 март! Пожелавам ти да вървиш през живота с лека походка и да получаваш с лекота всичко, което пожелаеш." },
  { name:"AK 47", rarity:"red", chance:0.64, img:"pictures/ak 47Done.png", desc: "Невъзможно е дори за миг да си представя света без теб, без твоята красота и нежност." },
  { name:"Five Seven", rarity:"blue", chance:20, img:"pictures/FiveSevenDone.jpg", desc: "Нека празникът 8 март бъде изпълнен с положителни емоции, букети цветя и приятни подаръци." },
  { name:"Famas", rarity:"blue", chance:20, img:"pictures/FamasDone.jpg", desc: "Честит 8 март! Пожелавам ти пролетно настроение и душата ти винаги да прелива от любов." },
  { name:"Mag7", rarity:"blue", chance:20, img:"pictures/Mag7Done.png", desc: "В най-нежния и красив ден в годината бързам да те поздравя за 8 март!" },
  { name:"Mp7", rarity:"blue", chance:20, img:"pictures/Mp7Done.jpg", desc: "Най-сладката и нежна, най-красивата и обичана! Честит 8 март, мила!" },
  { name:"Nova", rarity:"blue", chance:20, img:"pictures/NovaDone.jpg", desc: "Честит 8 март, Kurt! Нека пролетта винаги живее в душата ти." },
  { name:"Deagle", rarity:"pink", chance:3, img:"pictures/DeagleDone.jpg", desc: "Нека този прекрасен празник ти донесе много сбъднати мечти." },
  { name:"Mp5 SD", rarity:"purple", chance:15, img:"pictures/Mp5 SD.jpg", desc: "На 8 март бързам да ти пожелая всичко най-добро, най-важно и красиво за една прекрасна жена." },
  { name:"Mac 10", rarity:"purple", chance:15, img:"pictures/Mac10Done.jpg", desc: "Мила мамо, поздравления за 8 март! Желая ти пролетно настроение и безкрайно щастие." },
  { name:"Xm9", rarity:"blue", chance:20, img:"pictures/Xm9Done.jpg", desc: "Честит 8 март, мила мамо! Пожелавам ти океан от щастие и светлина в очите." },
  { name:"AWP", rarity:"pink", chance:3, img:"pictures/AwpDone.jpg", desc: "Скъпа моя мамо, поздравявам те за 8 март! Нека всички грижи и несгоди да изчезнат от живота ти." },
];

const reel = document.getElementById("reel");
const reelContainer = document.getElementById("reelContainer");
const openBtn = document.getElementById("openBtn");
const result = document.getElementById("result");
const glow = document.getElementById("caseGlow");

let spinningSound;

function pickSkin() {
  let multiplier = 100;
  let total = skins.reduce((a,b)=>a + (b.chance * multiplier),0);
  let r = Math.floor(Math.random() * total);
  let sum = 0;
  for(let s of skins){
    sum += s.chance * multiplier;
    if(r < sum) return s;
  }
}

function createReel(winner){
  reel.innerHTML = "";
  let items = [];
  for(let i=0;i<6;i++) skins.forEach(s=>items.push(s));
  let winPos = 40 + Math.floor(Math.random()*5);
  items[winPos] = winner;

  items.forEach(s=>{
    let div = document.createElement("div");
    div.className = "reel-item "+s.rarity;
    div.innerHTML = `<img src="${s.img}"><div>${s.name}</div>`;
    reel.appendChild(div);
  });

  reelContainer.style.display="block";
  // Force layout recalculation
  void reelContainer.offsetWidth;
  
  // Get the actual rendered element position
  let winningElement = reel.children[winPos];
  let reelRect = reel.getBoundingClientRect();
  let itemRect = winningElement.getBoundingClientRect();
  let itemCenterInReel = itemRect.left - reelRect.left + itemRect.width / 2;
  
  let containerWidth = reelContainer.offsetWidth;
  let barPosition = containerWidth / 2;
  
  // The current translateX is usually 0 at start, so itemCenterInReel is where it currently is
  // We need to translate so itemCenterInReel - target = barPosition
  let target = itemCenterInReel - barPosition;
  let start = null;

  spinningSound = new Audio("sounds/spin.mp3");
  spinningSound.loop = true;
  spinningSound.volume = 0.5;
  spinningSound.play();

  function animate(t){
    if(!start) start=t;
    let progress=(t-start)/5000;
    if(progress>1) progress=1;
    let ease = 1 - Math.pow(1-progress,3);
    reel.style.transform = `translateX(-${ease*target}px)`;
    if(progress < 1){
      requestAnimationFrame(animate);
    } else {
      spinningSound.pause();
      showResult(winner);
    }
  }

  requestAnimationFrame(animate);
}

function createConfetti() {
  for (let i = 0; i < 200; i++) {
    const confetti = document.createElement('div');
    confetti.className = 'confetti';
    confetti.style.left = Math.random() * 100 + 'vw';
    const delay = Math.random() * 3;
    confetti.style.animationDelay = delay + 's';
    confetti.style.backgroundColor = `hsl(${Math.random() * 360}, 100%, 50%)`;
    document.body.appendChild(confetti);
    // Remove after animation completes (5s duration + delay)
    setTimeout(() => confetti.remove(), (5 + delay) * 1000);
  }
}

function showResult(skin){
  glow.className = "case-glow glow-"+skin.rarity;
  glow.style.opacity = 1;
  result.innerHTML = `
    <div class="skin-card ${skin.rarity}">
      <h2>${skin.name}</h2>
      <img src="${skin.img}" width="200">
      <p>Rarity: ${skin.rarity.toUpperCase()}</p>
      <div class="skin-desc">${skin.desc}</div>
    </div>
  `;
  createConfetti();
}

// za prerabotka

openBtn.onclick = () => {
  //openBtn.disabled = true;

  const winner = pickSkin();
  createReel(winner); // ще предадем звука на функцията, за да го спрем накрая
}
</script>

</main>
</body>
</html>
